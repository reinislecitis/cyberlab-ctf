<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberLab CTF — Pasniedzēja Panelis</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060a0e;
    --panel: #0b1219;
    --border: #162d47;
    --accent: #00e5ff;
    --green: #00ff88;
    --red: #ff3a5c;
    --yellow: #ffd600;
    --orange: #ff8c00;
    --dim: #1a3050;
    --text: #b8d0e8;
    --muted: #3d6a8a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Exo 2', sans-serif; min-height: 100vh; }
  body::before { content:''; position:fixed; inset:0; background-image: linear-gradient(rgba(0,229,255,0.025) 1px,transparent 1px), linear-gradient(90deg,rgba(0,229,255,0.025) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }

  /* LOGIN */
  #loginScreen { position:fixed; inset:0; z-index:200; display:flex; align-items:center; justify-content:center; background:var(--bg); }
  .login-box { background:var(--panel); border:1px solid var(--border); border-top:2px solid var(--orange); border-radius:12px; padding:36px 40px; width:100%; max-width:380px; box-shadow:0 20px 60px rgba(0,0,0,0.8); animation:fadeIn .4s ease; }
  @keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .login-logo { font-family:'Orbitron',monospace; font-size:1.3rem; font-weight:900; color:var(--orange); letter-spacing:3px; text-align:center; margin-bottom:4px; }
  .login-sub { text-align:center; color:var(--muted); font-size:0.75rem; letter-spacing:2px; font-family:'Share Tech Mono',monospace; margin-bottom:28px; }
  .login-label { display:block; font-family:'Share Tech Mono',monospace; font-size:0.7rem; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:6px; }
  .login-input { width:100%; background:rgba(0,0,0,0.4); border:1px solid var(--border); border-radius:6px; padding:10px 13px; font-family:'Share Tech Mono',monospace; font-size:0.9rem; color:var(--text); outline:none; margin-bottom:16px; transition:border-color .2s; }
  .login-input:focus { border-color:var(--orange); }
  .login-btn { width:100%; background:linear-gradient(135deg,#5a2200,#3a1500); border:1px solid var(--orange); color:var(--orange); padding:11px; border-radius:6px; font-family:'Orbitron',monospace; font-size:0.76rem; font-weight:700; letter-spacing:2px; cursor:pointer; transition:all .2s; }
  .login-btn:hover { background:linear-gradient(135deg,#7a3000,#5a2000); box-shadow:0 0 18px rgba(255,140,0,0.25); }
  .login-error { margin-top:10px; background:rgba(255,58,92,0.1); border:1px solid var(--red); border-radius:5px; padding:9px 12px; font-family:'Share Tech Mono',monospace; font-size:0.78rem; color:var(--red); display:none; }

  /* HEADER */
  header { position:relative; z-index:10; padding:14px 28px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; background:rgba(11,18,25,0.97); backdrop-filter:blur(10px); }
  .logo { font-family:'Orbitron',monospace; font-size:1.1rem; font-weight:900; color:var(--orange); letter-spacing:3px; }
  .logo span { color:var(--accent); }
  .header-meta { font-family:'Share Tech Mono',monospace; font-size:0.74rem; color:var(--muted); display:flex; align-items:center; gap:20px; }
  .live-dot { width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); display:inline-block; margin-right:6px; animation:blink 1.5s ease infinite; }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
  .refresh-btn { background:none; border:1px solid var(--border); color:var(--muted); padding:5px 12px; border-radius:4px; font-family:'Share Tech Mono',monospace; font-size:0.7rem; cursor:pointer; transition:all .2s; }
  .refresh-btn:hover { border-color:var(--accent); color:var(--accent); }
  .logout-btn { background:none; border:1px solid var(--border); color:var(--muted); padding:5px 10px; border-radius:4px; font-family:'Share Tech Mono',monospace; font-size:0.7rem; cursor:pointer; transition:all .2s; }
  .logout-btn:hover { border-color:var(--red); color:var(--red); }

  /* MAIN */
  .container { position:relative; z-index:5; max-width:1300px; margin:0 auto; padding:24px 20px; }

  /* Summary cards */
  .summary-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:28px; }
  .sum-card { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:18px 20px; }
  .sum-val { font-family:'Orbitron',monospace; font-size:2rem; font-weight:900; margin-bottom:4px; }
  .sum-label { font-size:0.72rem; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
  .c-blue { color:var(--accent); }
  .c-green { color:var(--green); }
  .c-yellow { color:var(--yellow); }
  .c-orange { color:var(--orange); }

  /* Leaderboard */
  .section-title { font-family:'Orbitron',monospace; font-size:0.78rem; color:var(--muted); letter-spacing:3px; text-transform:uppercase; margin-bottom:14px; display:flex; align-items:center; gap:10px; }
  .section-title::after { content:''; flex:1; height:1px; background:var(--border); }

  .two-col { display:grid; grid-template-columns:1fr 1.6fr; gap:20px; margin-bottom:24px; }

  .leaderboard { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:20px; }
  .lb-row { display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:6px; margin-bottom:6px; transition:background .2s; }
  .lb-row:hover { background:rgba(0,229,255,0.04); }
  .lb-row.rank-1 { background:rgba(255,214,0,0.07); border:1px solid rgba(255,214,0,0.15); }
  .lb-row.rank-2 { background:rgba(192,192,192,0.05); }
  .lb-row.rank-3 { background:rgba(205,127,50,0.06); }
  .lb-rank { font-family:'Orbitron',monospace; font-size:0.8rem; color:var(--muted); width:22px; text-align:center; }
  .rank-1 .lb-rank { color:var(--yellow); }
  .rank-2 .lb-rank { color:#c0c0c0; }
  .rank-3 .lb-rank { color:#cd7f32; }
  .lb-name { flex:1; font-size:0.88rem; font-weight:600; }
  .lb-score { font-family:'Orbitron',monospace; font-size:0.85rem; color:var(--yellow); font-weight:700; }
  .lb-bar-wrap { width:80px; height:5px; background:var(--dim); border-radius:3px; overflow:hidden; }
  .lb-bar { height:100%; background:linear-gradient(90deg,var(--green),var(--accent)); border-radius:3px; }
  .lb-solved { font-family:'Share Tech Mono',monospace; font-size:0.72rem; color:var(--muted); }

  /* Progress heatmap */
  .heatmap-section { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:20px; }
  .heatmap-table { width:100%; border-collapse:collapse; font-size:0.75rem; }
  .heatmap-table th { font-family:'Share Tech Mono',monospace; color:var(--muted); letter-spacing:1px; text-align:left; padding:6px 8px; font-weight:normal; font-size:0.66rem; border-bottom:1px solid var(--border); }
  .heatmap-table td { padding:7px 8px; border-bottom:1px solid rgba(26,58,92,0.4); vertical-align:middle; }
  .heatmap-table tr:hover td { background:rgba(0,229,255,0.03); }
  .student-name-cell { font-weight:600; font-size:0.82rem; white-space:nowrap; }
  .cell-solved { width:22px; height:22px; border-radius:3px; display:inline-block; cursor:default; }
  .cell-solved.yes { background:var(--green); box-shadow:0 0 4px rgba(0,255,136,0.4); }
  .cell-solved.hint { background:var(--yellow); }
  .cell-solved.no { background:var(--dim); }
  .total-cell { font-family:'Orbitron',monospace; font-size:0.8rem; color:var(--yellow); font-weight:700; }
  .pct-cell { font-family:'Share Tech Mono',monospace; font-size:0.72rem; color:var(--muted); }

  /* Challenge breakdown */
  .chall-stats { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:20px; margin-bottom:24px; }
  .chall-row { display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid rgba(26,58,92,0.3); }
  .chall-row:last-child { border-bottom:none; }
  .chall-name { flex:1; font-size:0.82rem; }
  .chall-icon { font-size:1rem; }
  .chall-count { font-family:'Share Tech Mono',monospace; font-size:0.78rem; color:var(--muted); width:70px; text-align:right; }
  .chall-bar-wrap { width:120px; height:6px; background:var(--dim); border-radius:3px; overflow:hidden; }
  .chall-bar { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--accent),var(--green)); }

  .empty-state { padding:32px; text-align:center; color:var(--muted); font-family:'Share Tech Mono',monospace; font-size:0.82rem; }
  .loading { padding:20px; text-align:center; color:var(--muted); font-family:'Share Tech Mono',monospace; font-size:0.8rem; animation:pulse .8s ease infinite alternate; }
  @keyframes pulse{from{opacity:.5}to{opacity:1}}

  @media(max-width:900px){ .two-col{grid-template-columns:1fr;} .summary-grid{grid-template-columns:repeat(2,1fr);} }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">ADMIN</div>
    <div class="login-sub">PASNIEDZĒJA PANELIS</div>
    <label class="login-label">Admin parole</label>
    <input class="login-input" id="adminPwd" type="password" placeholder="••••••••" />
    <button class="login-btn" onclick="adminLogin()">IEIET →</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">CYBER<span>LAB</span> <span style="font-size:.7rem;color:var(--muted);letter-spacing:2px">ADMIN</span></div>
  <div class="header-meta">
    <span><span class="live-dot"></span>LIVE</span>
    <span id="lastUpdated">—</span>
    <button class="refresh-btn" onclick="loadAll()">↻ ATJAUNINĀT</button>
    <button class="logout-btn" onclick="adminLogout()">IZIET</button>
  </div>
</header>

<div class="container" id="mainApp" style="display:none">

  <!-- Summary -->
  <div class="summary-grid">
    <div class="sum-card"><div class="sum-val c-blue" id="sumStudents">—</div><div class="sum-label">Studenti</div></div>
    <div class="sum-card"><div class="sum-val c-green" id="sumSolves">—</div><div class="sum-label">Atrisinājumi</div></div>
    <div class="sum-card"><div class="sum-val c-yellow" id="sumAvgScore">—</div><div class="sum-label">Vid. punkti</div></div>
    <div class="sum-card"><div class="sum-val c-orange" id="sumAvgPct">—</div><div class="sum-label">Vid. progress</div></div>
  </div>

  <div class="two-col">
    <!-- Leaderboard -->
    <div class="leaderboard">
      <div class="section-title">🏆 REZULTĀTU TABULA</div>
      <div id="leaderboardList"><div class="loading">Ielādē...</div></div>
    </div>

    <!-- Challenge solve rates -->
    <div class="chall-stats">
      <div class="section-title">📊 UZDEVUMU STATISTIKA</div>
      <div id="challBreakdown"><div class="loading">Ielādē...</div></div>
    </div>
  </div>

  <!-- Heatmap -->
  <div class="heatmap-section">
    <div class="section-title">🗺️ PROGRESS KARTE <span style="font-size:.65rem;color:var(--muted);margin-left:8px">🟩 atrisināts &nbsp; 🟨 ar padomu &nbsp; ⬛ nav atrisināts</span></div>
    <div id="heatmapWrap" style="overflow-x:auto"><div class="loading">Ielādē...</div></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
const ADMIN_PASSWORD = 'YOUR_ADMIN_PASSWORD';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const CHALLENGES = [
  {id:1,title:"CIA Triāde",icon:"🔐"},{id:2,title:"Base64",icon:"🔑"},{id:3,title:"Droša Parole",icon:"🔍"},
  {id:4,title:"Autent. Faktori",icon:"🛡️"},{id:5,title:"Caesar Šifrs",icon:"🔄"},{id:6,title:"HTTP vs HTTPS",icon:"🌐"},
  {id:7,title:"GDPR Nolūks",icon:"🗄️"},{id:8,title:"Hash Algoritms",icon:"🔒"},{id:9,title:"3-2-1 Backup",icon:"💾"},
  {id:10,title:"Asim. Šifrēšana",icon:"🔐"},{id:11,title:"Jutīgie Dati",icon:"📊"},
  {id:12,title:"NIS2 Termiņš",icon:"📋"},{id:13,title:"ISO 27001",icon:"⚖️"},{id:14,title:"GDPR Sods",icon:"🇪🇺"},
  {id:15,title:"Latvijas CERT",icon:"🏛️"},{id:16,title:"NIS2 Kategorijas",icon:"📜"},
  {id:17,title:"Pikšķerēšana",icon:"⚠️"},{id:18,title:"Ransomware",icon:"🦠"},{id:19,title:"MITRE ATT&CK",icon:"🌐"},
  {id:20,title:"SQL Injekcija",icon:"💉"},{id:21,title:"DDoS Veids",icon:"📡"},{id:22,title:"Kill Chain",icon:"🎭"},
  {id:23,title:"Ugunsmūris",icon:"🔒"},{id:24,title:"Soc. Inženierija",icon:"📱"},{id:25,title:"IR Secība",icon:"🏗️"},
  {id:26,title:"2FA Faktori",icon:"🔑"},{id:27,title:"Klasifikācija",icon:"🗂️"},{id:28,title:"Zero Trust",icon:"🧱"},
];

function adminLogin() {
  const pwd = document.getElementById('adminPwd').value;
  if (pwd === ADMIN_PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    loadAll();
    setInterval(loadAll, 30000); // auto-refresh 30s
  } else {
    const e = document.getElementById('loginError');
    e.textContent = 'Nepareiza parole!';
    e.style.display = 'block';
  }
}

function adminLogout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('adminPwd').value = '';
  document.getElementById('loginError').style.display = 'none';
}

async function loadAll() {
  const { data: students } = await sb.from('students').select('*').order('total_score', { ascending: false });
  const { data: progress } = await sb.from('progress').select('*');
  if (!students || !progress) return;

  const now = new Date();
  document.getElementById('lastUpdated').textContent = now.toLocaleTimeString('lv-LV');

  renderSummary(students, progress);
  renderLeaderboard(students);
  renderChallengeBreakdown(progress);
  renderHeatmap(students, progress);
}

function renderSummary(students, progress) {
  const totalStudents = students.length;
  const totalSolves = progress.length;
  const avgScore = totalStudents ? Math.round(students.reduce((s,x) => s + (x.total_score||0), 0) / totalStudents) : 0;
  const maxPts = CHALLENGES.reduce((s, c) => {
    const pts = [1,2,3,4,5,6].includes(c.id) ? (c.id===5?30:20) : 30; // rough
    return s + pts;
  }, 0);
  const avgPct = totalStudents ? Math.round(students.reduce((s,x) => s + ((x.total_score||0) / 660 * 100), 0) / totalStudents) : 0;

  document.getElementById('sumStudents').textContent = totalStudents;
  document.getElementById('sumSolves').textContent = totalSolves;
  document.getElementById('sumAvgScore').textContent = avgScore;
  document.getElementById('sumAvgPct').textContent = avgPct + '%';
}

function renderLeaderboard(students) {
  const el = document.getElementById('leaderboardList');
  if (!students.length) { el.innerHTML = '<div class="empty-state">Nav datu</div>'; return; }
  const maxScore = Math.max(...students.map(s => s.total_score || 0), 1);
  el.innerHTML = students.slice(0, 15).map((s, i) => {
    const rank = i + 1;
    const pct = Math.round(((s.total_score||0) / maxScore) * 100);
    return `<div class="lb-row ${rank<=3?'rank-'+rank:''}">
      <div class="lb-rank">${rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':rank}</div>
      <div class="lb-name">${esc(s.name)}</div>
      <div class="lb-bar-wrap"><div class="lb-bar" style="width:${pct}%"></div></div>
      <div class="lb-score">${s.total_score||0}</div>
    </div>`;
  }).join('');
}

function renderChallengeBreakdown(progress) {
  const el = document.getElementById('challBreakdown');
  const countMap = {};
  progress.forEach(p => { countMap[p.challenge_id] = (countMap[p.challenge_id]||0) + 1; });

  const { data: studentCountPromise } = { data: null };
  // Get student count from DOM
  const studentCount = parseInt(document.getElementById('sumStudents').textContent) || 1;
  const maxCount = Math.max(...Object.values(countMap), 1);

  el.innerHTML = CHALLENGES.map(ch => {
    const cnt = countMap[ch.id] || 0;
    const pct = Math.round((cnt / Math.max(studentCount, 1)) * 100);
    const barW = Math.round((cnt / maxCount) * 100);
    return `<div class="chall-row">
      <div class="chall-icon">${ch.icon}</div>
      <div class="chall-name">${ch.title}</div>
      <div class="chall-bar-wrap"><div class="chall-bar" style="width:${barW}%"></div></div>
      <div class="chall-count">${cnt} (${pct}%)</div>
    </div>`;
  }).join('');
}

function renderHeatmap(students, progress) {
  const el = document.getElementById('heatmapWrap');
  if (!students.length) { el.innerHTML = '<div class="empty-state">Nav studentu</div>'; return; }

  // Build lookup: student+challenge → {solved, hint_used}
  const lookup = {};
  progress.forEach(p => { lookup[`${p.student_name}::${p.challenge_id}`] = p; });

  const maxPossible = 660; // approximate max score

  let html = `<table class="heatmap-table">
    <thead><tr>
      <th>STUDENTS</th>
      ${CHALLENGES.map(c => `<th title="${c.title}">${c.icon}</th>`).join('')}
      <th>PTS</th>
      <th>%</th>
    </tr></thead>
    <tbody>`;

  students.forEach(s => {
    const score = s.total_score || 0;
    const pct = Math.round((score / maxPossible) * 100);
    html += `<tr>
      <td class="student-name-cell">${esc(s.name)}</td>
      ${CHALLENGES.map(ch => {
        const key = `${s.name}::${ch.id}`;
        const p = lookup[key];
        if (p) return `<td><div class="cell-solved ${p.hint_used ? 'hint' : 'yes'}" title="${ch.title}${p.hint_used?' (ar padomu)':''}"></div></td>`;
        return `<td><div class="cell-solved no" title="${ch.title}"></div></td>`;
      }).join('')}
      <td class="total-cell">${score}</td>
      <td class="pct-cell">${pct}%</td>
    </tr>`;
  });

  html += '</tbody></table>';
  el.innerHTML = html;
}

function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

document.addEventListener('keydown', e => { if (e.key === 'Enter') adminLogin(); });
</script>
</body>
</html>
